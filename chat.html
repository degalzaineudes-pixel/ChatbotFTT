<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    /* Force le widget CXone à remplir toute la page au lieu de rester en bas à droite */
    [id*="cxone"], [class*="cxone"], [class*="cx-widget"],
    [id*="chat-widget"], [id*="chatWidget"] {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      bottom: 0 !important;
      right: 0 !important;
      left: 0 !important;
      top: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /* Ouvre automatiquement le chat panel */
    [class*="cx-widget__chat"],
    [class*="cx-chat-container"],
    [class*="chat-container"] {
      display: flex !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>

<script>
  (function(n,u){
    window.CXoneDfo=n,
    window[n]=window[n]||function(){(window[n].q=window[n].q||[]).push(arguments)},window[n].u=u,
    e=document.createElement("script"),e.type="module",e.src=u+"?"+Math.round(Date.now()/1e3/3600),
    document.head.appendChild(e)
  })('cxone','https://web-modules-de-eu1.niceincontact.com/loader/1/loader.js');

  cxone('init', '1326');
  cxone('chat', 'setCustomerName', 'Visiteur');
  cxone('chat', 'init', 1326, 'chat_a0479705-9775-4047-8472-ffc2dc2f86c2');

  // Tente d'ouvrir automatiquement le chat après chargement
  window.addEventListener('load', function() {
    setTimeout(function autoOpen() {
      // Cherche le bouton d'ouverture et clique dessus automatiquement
      const btns = document.querySelectorAll(
        '[class*="cx-btn"], [class*="cx-button"], [id*="cx-btn"], ' +
        '[aria-label*="chat"], [aria-label*="Chat"], ' +
        'button[class*="widget"], button[class*="chat"]'
      );
      if (btns.length > 0) {
        btns[0].click();
      } else {
        setTimeout(autoOpen, 500);
      }
    }, 1000);
  });
</script>

</body>
</html>
